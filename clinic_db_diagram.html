
<style>
#erd { width: 100%; overflow-x: auto; padding: 8px 0; }
#erd svg { min-width: 900px; }
</style>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Clinic database entity relationship diagram showing all tables and their relationships</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  Countries {
    int CountryID PK
    string CountryName
  }

  People {
    int PersonID PK
    string NationalNo
    string FirstName
    string SecondName
    string ThirdName
    string LastName
    date DateOfBirth
    string Gender
    string Address
    string Phone
    string Email
    int NationalityCountryID FK
    string ImagePath
  }

  Users {
    int UserID PK
    int PersonID FK
    string UserName
    string PasswordHash
    bool IsActive
    datetime CreatedDate
    datetime LastLoginDate
  }

  Patients {
    int PatientID PK
    int PersonID FK
    int CreatedByUserID FK
    datetime CreatedDate
  }

  Doctors {
    int DoctorID PK
    int PersonID FK
    string Specialization
    string LicenseNumber
    bool IsAvailable
  }

  ApplicationTypes {
    int ApplicationTypeID PK
    string ApplicationTypeTitle
    decimal ApplicationFees
  }

  Applications {
    int ApplicationID PK
    int PatientPersonID FK
    date ApplicationDate
    int ApplicationTypeID FK
    string ApplicationStatus
    date LastStatusDate
    decimal PaidFees
    int ParentApplicationID FK
    int CreatedByUserID FK
  }

  Resources {
    int ResourceID PK
    string ResourceName
    string ResourceType
    bool IsAvailable
  }

  SurgeryType {
    int SurgeryTypeID PK
    string SurgeryTypeTitle
    decimal SurgeryFees
  }

  Appointments {
    int AppointmentID PK
    int ApplicationID FK
    int DoctorID FK
    date AppointmentDate
    decimal PaidFees
    int CreatedByUserID FK
    bool IsLocked
  }

  AppointmentResources {
    int AppointmentResourceID PK
    int AppointmentID FK
    int ResourceID FK
  }

  Consultation {
    int ConsultationID PK
    int AppointmentID FK
    string Diagnosis
    string Notes
  }

  Surgery {
    int SurgeryID PK
    int AppointmentID FK
    int SurgeryTypeID FK
    string Outcome
    string Notes
  }

  Invoices {
    int InvoiceID PK
    int AppointmentID FK
    decimal TotalAmount
    date IssuedDate
    date DueDate
  }

  Payments {
    int PaymentID PK
    int InvoiceID FK
    decimal AmountPaid
    date PaymentDate
    string PaymentMethod
    int ReceivedByUserID FK
  }

  Countries ||--o{ People : "nationality"
  People ||--o| Users : "has account"
  People ||--o| Patients : "registered as"
  People ||--o| Doctors : "works as"
  Patients ||--o{ Applications : "submits"
  ApplicationTypes ||--o{ Applications : "typed as"
  Applications ||--o| Applications : "parent of"
  Applications ||--o{ Appointments : "schedules"
  Doctors ||--o{ Appointments : "assigned to"
  Appointments ||--o{ AppointmentResources : "uses"
  Resources ||--o{ AppointmentResources : "reserved in"
  Appointments ||--o| Consultation : "results in"
  Appointments ||--o| Surgery : "results in"
  SurgeryType ||--o{ Surgery : "typed as"
  Appointments ||--o| Invoices : "billed by"
  Invoices ||--o{ Payments : "paid via"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
